# Rentoza Application Configuration Template
# Copy this file to application.properties and fill in the actual values
# NEVER commit application.properties to git - it should be in .gitignore

# =============================================================================
# APPLICATION
# =============================================================================
spring.application.name=Rentoza

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
# Database connection URL
# Dev: jdbc:mysql://localhost:3306/rentoza?useSSL=false&serverTimezone=UTC
# Prod: jdbc:mysql://your-db-host:3306/rentoza?useSSL=true&requireSSL=true&serverTimezone=UTC
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/rentoza?useSSL=false&serverTimezone=UTC}

# Database credentials (NEVER commit actual values)
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================================
# JPA / HIBERNATE
# =============================================================================
# DDL auto: update (dev), validate (prod)
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

# Show SQL (true in dev, false in prod)
spring.jpa.show-sql=${SHOW_SQL:false}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =============================================================================
# JWT CONFIGURATION
# =============================================================================
# JWT secret key (MUST be base64 encoded, minimum 256 bits)
# Generate with: openssl rand -base64 64
jwt.secret=${JWT_SECRET:}

# JWT expiration time in milliseconds (default: 15 minutes = 900000ms)
jwt.expiration=${JWT_EXPIRATION_MS:900000}

# JWT issuer (your application URL)
jwt.issuer=${JWT_ISSUER:rentoza}

# JWT audience (who can use this token)
jwt.audience=${JWT_AUDIENCE:rentoza-api}

# =============================================================================
# REFRESH TOKEN CONFIGURATION
# =============================================================================
# Refresh token expiration in days (default: 14 days)
refresh-token.expiration-days=${REFRESH_TOKEN_DAYS:14}

# =============================================================================
# CORS CONFIGURATION
# =============================================================================
# Allowed origins (comma-separated for multiple)
# Dev: http://localhost:4200
# Prod: https://rentoza.rs,https://www.rentoza.rs
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# =============================================================================
# COOKIE CONFIGURATION
# =============================================================================
# Cookie security flag (false in dev, true in prod)
app.cookie.secure=${COOKIE_SECURE:false}

# Cookie domain (localhost in dev, rentoza.rs in prod)
app.cookie.domain=${COOKIE_DOMAIN:localhost}

# Cookie SameSite policy
app.cookie.same-site=${COOKIE_SAME_SITE:Strict}

# =============================================================================
# SERVER CONFIGURATION
# =============================================================================
# Server port (8080 for HTTP, 8443 for HTTPS)
server.port=${SERVER_PORT:8080}

# SSL Configuration (enable in production)
server.ssl.enabled=${SSL_ENABLED:false}
# server.ssl.key-store=${SSL_KEYSTORE:}
# server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:}
# server.ssl.key-store-type=PKCS12

# Session cookie settings
server.servlet.session.cookie.same-site=strict

# =============================================================================
# LOGGING
# =============================================================================
# Log levels
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.example.rentoza=${LOG_LEVEL_APP:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================================================================
# FILE UPLOAD (for future car images)
# =============================================================================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# =============================================================================
# ACTUATOR (for health checks in production)
# =============================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
