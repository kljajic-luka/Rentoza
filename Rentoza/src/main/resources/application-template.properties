# =============================================================================
# Rentoza Application Configuration Template
# =============================================================================
# This is a TEMPLATE file for documentation purposes
# Copy appropriate sections to application-{profile}.properties
#
# NEVER commit actual credentials to version control
# Use environment variables or .env files (gitignored) for sensitive data

# =============================================================================
# QUICK START GUIDE
# =============================================================================
# 1. For local development:
#    - Copy example values to application-dev-local.properties (gitignored)
#    - Or set environment variables
#    - Activate with: -Dspring.profiles.active=dev
#
# 2. For production:
#    - Set ALL required environment variables
#    - Use secrets manager (AWS Secrets, Azure Key Vault, etc.)
#    - Activate with: -Dspring.profiles.active=prod

# =============================================================================
# ENVIRONMENT VARIABLES REFERENCE
# =============================================================================

# --- Required for ALL environments ---
JWT_SECRET=                    # Base64 encoded secret (64+ bytes). Generate: openssl rand -base64 64
DB_URL=                        # JDBC connection string
DB_USERNAME=                   # Database username
DB_PASSWORD=                   # Database password
CORS_ORIGINS=                  # Allowed frontend origins (comma-separated)
COOKIE_DOMAIN=                 # Cookie domain (localhost for dev, yourdomain.com for prod)

# --- Development defaults (optional overrides) ---
DB_URL=jdbc:mysql://localhost:3306/rentoza?useSSL=false&serverTimezone=UTC
DB_USERNAME=root
DB_PASSWORD=root
CORS_ORIGINS=http://localhost:4200
COOKIE_DOMAIN=localhost
COOKIE_SECURE=false
SERVER_PORT=8080
LOG_LEVEL_ROOT=INFO
LOG_LEVEL_APP=DEBUG

# --- Production required ---
DB_URL=jdbc:mysql://prod-db-host:3306/rentoza?useSSL=true&requireSSL=true&serverTimezone=UTC
DB_USERNAME=rentoza_prod_user
DB_PASSWORD=<use-secrets-manager>
CORS_ORIGINS=https://rentoza.rs,https://www.rentoza.rs
COOKIE_DOMAIN=rentoza.rs
COOKIE_SECURE=true
SERVER_PORT=8080
SSL_ENABLED=false              # true if terminating SSL in Spring Boot, false if using reverse proxy

# --- Optional production settings ---
DB_POOL_SIZE=20
DB_POOL_MIN_IDLE=5
JWT_EXPIRATION_MS=900000       # 15 minutes in milliseconds
JWT_ISSUER=rentoza
JWT_AUDIENCE=rentoza-api
REFRESH_TOKEN_DAYS=14
LOG_FILE_PATH=/var/log/rentoza/application.log
ACTUATOR_PORT=8080
METRICS_PROMETHEUS_ENABLED=false
MAX_FILE_SIZE=10MB
MAX_REQUEST_SIZE=10MB

# --- SSL Configuration (if terminating in Spring Boot) ---
SSL_KEYSTORE=/path/to/keystore.p12
SSL_KEYSTORE_PASSWORD=<keystore-password>
SSL_KEY_ALIAS=rentoza

# =============================================================================
# DATABASE CONFIGURATION EXAMPLES
# =============================================================================

# MySQL (recommended for production)
DB_URL=jdbc:mysql://localhost:3306/rentoza?useSSL=false&serverTimezone=UTC

# MySQL with SSL (production)
DB_URL=jdbc:mysql://prod-host:3306/rentoza?useSSL=true&requireSSL=true&serverTimezone=UTC&verifyServerCertificate=true

# PostgreSQL (alternative)
DB_URL=jdbc:postgresql://localhost:5432/rentoza
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================================================
# JWT SECRET GENERATION
# =============================================================================

# Generate a secure JWT secret:
# openssl rand -base64 64

# Example (DO NOT USE THIS - GENERATE YOUR OWN):
# JWT_SECRET=YourGeneratedBase64SecretHereThatIsAtLeast64BytesLongAndCryptographicallySecure==

# =============================================================================
# CORS CONFIGURATION EXAMPLES
# =============================================================================

# Development (multiple local ports)
CORS_ORIGINS=http://localhost:4200,http://localhost:4201,http://127.0.0.1:4200

# Production (with www and non-www)
CORS_ORIGINS=https://rentoza.rs,https://www.rentoza.rs

# Staging environment
CORS_ORIGINS=https://staging.rentoza.rs

# =============================================================================
# SSL/TLS CONFIGURATION GUIDE
# =============================================================================

# Option 1: Reverse Proxy (Recommended for production)
# Use nginx or Apache to terminate SSL, then proxy to Spring Boot on HTTP
# Nginx ? HTTPS ? Public
# Nginx ? HTTP ? Spring Boot (8080)
#
# Spring Boot config:
SSL_ENABLED=false
SERVER_PORT=8080

# Option 2: Spring Boot SSL Termination
# Generate keystore:
# keytool -genkeypair -alias rentoza -keyalg RSA -keysize 2048 \
#   -storetype PKCS12 -keystore rentoza.p12 -validity 3650
#
# Spring Boot config:
SSL_ENABLED=true
SERVER_PORT=8443
SSL_KEYSTORE=/path/to/rentoza.p12
SSL_KEYSTORE_PASSWORD=your-keystore-password
SSL_KEY_ALIAS=rentoza

# =============================================================================
# LOGGING CONFIGURATION EXAMPLES
# =============================================================================

# Development - verbose logging
LOG_LEVEL_ROOT=INFO
LOG_LEVEL_APP=DEBUG
LOG_LEVEL_SQL=DEBUG

# Production - minimal logging
LOG_LEVEL_ROOT=WARN
LOG_LEVEL_APP=INFO
LOG_LEVEL_SQL=WARN
LOG_FILE_PATH=/var/log/rentoza/application.log

