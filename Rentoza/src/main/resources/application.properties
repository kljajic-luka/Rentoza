# =============================================================================
# Rentoza Application - Main Configuration
# =============================================================================
# This file contains common configurations shared across all profiles
# Profile-specific settings should be in application-{profile}.properties
# Active profile is set via: spring.profiles.active environment variable

spring.application.name=Rentoza

# =============================================================================
# PROFILE SELECTION
# =============================================================================
# Set active profile via environment variable: -Dspring.profiles.active=prod
# Or via ENV: SPRING_PROFILES_ACTIVE=prod
# Default to dev if not specified
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# =============================================================================
# DATABASE - Common Settings (PostgreSQL via Supabase)
# =============================================================================
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool settings (tuned for production)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# =============================================================================
# JPA / HIBERNATE - Common Settings
# =============================================================================
# NOTE: Do NOT explicitly set hibernate.dialect - Hibernate auto-detects from JDBC driver
# This prevents deprecation warnings. Hibernate will correctly detect PostgreSQLDialect.
spring.jpa.open-in-view=false

# Physical naming strategy: Convert camelCase to snake_case for database columns
# This maps pricePerDay -> price_per_day automatically
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =============================================================================
# JWT CONFIGURATION
# =============================================================================
# JWT secret MUST be set via environment variable
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:900000}
jwt.issuer=${JWT_ISSUER:rentoza}
jwt.audience=${JWT_AUDIENCE:rentoza-api}

# =============================================================================
# REFRESH TOKEN CONFIGURATION
# =============================================================================
refresh-token.expiration-days=${REFRESH_TOKEN_DAYS:14}

# =============================================================================
# CORS CONFIGURATION
# =============================================================================
app.cors.allowed-origins=${CORS_ORIGINS}

# =============================================================================
# CHAT MICROSERVICE CONFIGURATION
# =============================================================================
chat.service.url=${CHAT_SERVICE_URL:http://localhost:8081}

# =============================================================================
# COOKIE CONFIGURATION
# =============================================================================
app.cookie.secure=${COOKIE_SECURE:true}
app.cookie.domain=${COOKIE_DOMAIN}
app.cookie.same-site=${COOKIE_SAME_SITE:Strict}

# =============================================================================
# SERVER CONFIGURATION
# =============================================================================
server.port=${SERVER_PORT:8080}
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Session configuration
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=30m

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# =============================================================================
# ERROR HANDLING
# =============================================================================
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# =============================================================================
# FILE UPLOAD
# =============================================================================
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:30MB}
spring.servlet.multipart.enabled=true

# =============================================================================
# JACKSON (JSON Serialization)
# =============================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# =============================================================================
# ACTUATOR - Common Settings
# =============================================================================
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized
management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches
management.health.diskspace.enabled=true
management.health.db.enabled=true
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.enable.hikaricp=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# =============================================================================
# WEBSOCKET CONFIGURATION
# =============================================================================
websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:4200}

# =============================================================================
# MAIL CONFIGURATION
# =============================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=${MAIL_FROM:noreply@rentoza.com}

# Disable mail connection test during startup to prevent AuthenticationFailedException
# when credentials are missing (especially useful for dev environments)
spring.mail.test-connection=false

# Disable mail health check in dev to prevent startup failures
# Set to true in production if you want mail health monitoring
management.health.mail.enabled=${MAIL_HEALTH_ENABLED:false}

# Test email redirection (dev/staging only)
# WARNING: Never enable in production!
mail.test.enabled=${MAIL_TEST_ENABLED:false}
mail.test.recipient=${MAIL_TEST_RECIPIENT:lkkljjc@gmail.com}

# Notification channel toggles
notifications.email.enabled=${NOTIFICATIONS_EMAIL_ENABLED:false}
notifications.push.enabled=${NOTIFICATIONS_PUSH_ENABLED:false}

# =============================================================================
# BOOKING APPROVAL WORKFLOW FEATURE FLAGS
# =============================================================================
# Enable host-controlled approval workflow (Phase 1 rollout)
# When false: instant ACTIVE booking (legacy behavior)
# When true: bookings start as PENDING_APPROVAL, require host approval
app.booking.host-approval.enabled=${BOOKING_APPROVAL_ENABLED:true}

# Beta users who get approval workflow regardless of global flag (comma-separated user IDs)
app.booking.host-approval.beta-users=${BOOKING_APPROVAL_BETA_USERS:}

# Auto-expiry timeout for pending requests (in hours)
app.booking.host-approval.expiry-hours=${BOOKING_APPROVAL_EXPIRY_HOURS:48}

# =============================================================================
# BOOKING TIME DERIVATION CONFIGURATION
# =============================================================================
# Default dropoff time for bookings (HH:mm format)
# Used when no explicit dropoff time is specified
app.booking.default-dropoff-time=18:00

# Time window mappings (HH:mm format)
# These define the start times for each pickup time window
app.booking.time-windows.morning=09:00
app.booking.time-windows.afternoon=14:00
app.booking.time-windows.evening=18:00

# =============================================================================
# INTERNAL SERVICE JWT CONFIGURATION
# =============================================================================
# Secret key for signing internal service-to-service tokens
# Must match the key used by other microservices (e.g., chat-service)
internal.service.jwt.secret=aW50ZXJuYWxTZXJ2aWNlU2VjcmV0S2VjcmV0S2V5Rm9yU2VjdXJlU2VydmljZVRvU2VydmljZUNvbW11bmljYXRpb25Eb05vdFNoYXJl
internal.service.jwt.expiration=3600000

# =============================================================================
# SUPABASE AUTHENTICATION CONFIGURATION
# =============================================================================
# Supabase project URL (e.g., https://xxx.supabase.co)
supabase.url=${SUPABASE_URL}

# Anonymous key (safe for frontend, limited access via RLS)
supabase.anon-key=${SUPABASE_ANON_KEY}

# Service role key (backend only - bypasses RLS, full access)
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}

# JWT secret for validating Supabase-issued tokens (HS256)
supabase.jwt-secret=${SUPABASE_JWT_SECRET}

# OAuth2 redirect URI for Google authentication callback
# In development: https://localhost:4200/auth/supabase/google/callback
# In production: https://yourdomain.com/auth/supabase/google/callback
app.oauth2-redirect-uri=${OAUTH2_REDIRECT_URI:https://localhost:4200/auth/supabase/google/callback}

# =============================================================================
# STORAGE CONFIGURATION (Supabase Storage)
# =============================================================================
# Storage mode: 'supabase' for Supabase Storage (recommended for all environments)
# Legacy 'local' mode is deprecated and will be removed
storage.mode=${STORAGE_MODE:supabase}

# Supabase storage is enabled by default
storage.supabase.enabled=true

# =============================================================================
# FIREBASE CONFIGURATION
# =============================================================================
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:}

# =============================================================================
# LOGGING - Common Pattern
# =============================================================================
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# =============================================================================
# LEGACY JWT LOGGING SUPPRESSION
# =============================================================================
logging.level.org.example.rentoza.auth.RefreshTokenServiceEnhanced=ERROR
logging.level.org.example.rentoza.security.JwtAuthFilter=ERROR
logging.level.org.example.rentoza.security.JwtUtil=ERROR