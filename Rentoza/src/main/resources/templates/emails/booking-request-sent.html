<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8" />
		<title>Zahtev za rezervaciju poslat</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				line-height: 1.6;
				color: #333;
			}
			.container {
				max-width: 600px;
				margin: 0 auto;
				padding: 20px;
				border: 1px solid #ddd;
				border-radius: 5px;
			}
			.header {
				background-color: #2196f3;
				color: white;
				padding: 10px;
				text-align: center;
				border-radius: 5px 5px 0 0;
			}
			.content {
				padding: 20px;
			}
			.button {
				display: inline-block;
				padding: 10px 20px;
				background-color: #2196f3;
				color: white;
				text-decoration: none;
				border-radius: 5px;
				margin-top: 20px;
			}
			.footer {
				margin-top: 20px;
				font-size: 12px;
				color: #777;
				text-align: center;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="header">
				<h2>Zahtev poslat</h2>
			</div>
			<div class="content">
				<p>Poštovani,</p>
				<p th:text="${message}">Vaš zahtev za rezervaciju je uspešno poslat.</p>
				<p>
					Obavestićemo vas čim vlasnik vozila odgovori na vaš zahtev. Imate 48
					sati pre nego što zahtev automatski istekne.
				</p>
				<a th:href="${bookingUrl}" class="button">Pregled zahteva</a>
			</div>
			<div class="footer">
				<p>&copy; 2025 Rentoza. Sva prava zadržana.</p>
			</div>
		</div>
	</body>
</html>
