server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=true

# =============================================================================
# LOGGING - Development (Enhanced SQL Logging)
# =============================================================================
# Uses logback-spring.xml for detailed configuration with:
# - Correlation IDs for request tracking
# - Color-coded SQL keywords
# - Visual separators for better readability
# - SQL query count per request
# - Performance statistics

# SQL Debug Toggle - Enable enhanced SQL logging
# Set SQL_DEBUG_ENABLED=true to see:
# - Formatted SQL with color-coded keywords
# - Parameter binding values
# - Query count per request
# - Performance statistics
app.debug.sql=${SQL_DEBUG_ENABLED:false}

# Dynamic SQL logging level based on toggle
# When enabled: Shows SQL (DEBUG) and parameters (TRACE)
# When disabled: Only warnings and errors (WARN)
SQL_DEBUG_LEVEL=${app.debug.sql}

# Application logging levels (managed by logback-spring.xml)
logging.level.root=INFO
logging.level.org.example.rentoza=INFO

# Custom SQL logging filter (for correlation IDs and request stats)
logging.level.org.example.rentoza.config.logging.SqlLoggingFilter=INFO
logging.level.org.example.rentoza.config.logging.SqlLoggingInspector=DEBUG

# Framework logging (WARN to reduce console noise)
logging.level.org.springframework=WARN
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security.web.csrf=DEBUG
logging.level.org.example.rentoza.security.CsrfCookieFilter=TRACE
logging.level.org.example.rentoza.security.JwtAuthFilter=DEBUG

# Enhanced Hibernate/JPA logging
# Controlled by SQL_DEBUG_LEVEL property above
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=${SQL_DEBUG_LEVEL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${SQL_DEBUG_LEVEL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${SQL_DEBUG_LEVEL:WARN}
logging.level.org.hibernate.stat=INFO

# Connection pool logging (WARN to reduce verbose DEBUG pool stats)
# DEBUG level logs every connection creation - too noisy
logging.level.com.zaxxer.hikari=INFO
logging.level.com.zaxxer.hikari.pool=WARN

# WebSocket logging (WARN to reduce noise)
logging.level.org.springframework.messaging=WARN
logging.level.org.springframework.web.socket=WARN

# Mail logging (INFO to see email sending events)
logging.level.org.springframework.mail=INFO

# Thymeleaf template engine (WARN to reduce noise)
logging.level.org.thymeleaf=WARN

# Silence noisy startup messages
logging.level.org.hibernate.jpa.internal.util.LogHelper=WARN
logging.level.org.apache.catalina=WARN

