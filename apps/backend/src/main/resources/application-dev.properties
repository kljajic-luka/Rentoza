app.id-verification.provider=${APP_ID_VERIFICATION_PROVIDER:MOCK}

# =============================================================================
# DATABASE - Development (Supabase PostgreSQL)
# =============================================================================
# Supabase PostgreSQL connection
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-eu-central-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${DB_USERNAME:postgres.hwqdmtdroqliujmelzqx}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Development pool settings for Supabase Pooler (PgBouncer transaction mode)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.keepalive-time=0
spring.datasource.hikari.connection-test-query=SELECT 1

# =============================================================================
# JPA - Development (PostgreSQL)
# =============================================================================
# Use 'none' to skip schema validation/update (schema managed by Supabase migrations)
spring.jpa.hibernate.ddl-auto=none

# PostgreSQL dialect


# Physical naming strategy: Convert camelCase to snake_case for PostgreSQL
# This maps pricePerDay -> price_per_day automatically
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# PostgreSQL Enum Handling: Store enums by name (TEXT) for compatibility
# Use STRING type to properly handle PostgreSQL native ENUM columns
spring.jpa.properties.hibernate.type.preferred_enum_jdbc_type=STRING

# SQL Logging Configuration
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
spring.jpa.properties.hibernate.format.use_sql_formatter=true
spring.jpa.properties.hibernate.session_factory.statement_inspector=org.example.rentoza.config.logging.SqlLoggingInspector
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=50

# Batch configuration
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

