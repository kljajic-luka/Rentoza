# =============================================================================
# REDIS - Development (Enabled for Idempotency)
# =============================================================================
# Redis is ENABLED to support IdempotencyService
# To run Redis: brew install redis && brew services start redis
app.redis.enabled=true

# Clear exclusions so Redis auto-configuration runs
spring.autoconfigure.exclude=

# Connection Settings (Standalone mode for development)
# Reads from .env.local — set REDIS_HOST to your Upstash endpoint to use remote Redis,
# leave as localhost for a local Redis instance (no SSL needed locally).
