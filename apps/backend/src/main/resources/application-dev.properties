# ============================================================================
# BOOKING TIME DERIVATION CONFIGURATION
# =============================================================================
# Default dropoff time for bookings (HH:mm format)

# Disable reactive Redis auto-configuration (imperative Redis only when enabled)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# Disable Redis repositories auto-configuration when Redis is off
spring.data.redis.repositories.enabled=false
# Used when no explicit dropoff time is specified
app.booking.default-dropoff-time=18:00

# Time window mappings (HH:mm format)
# These define the start times for each pickup time window
app.booking.time-windows.morning=09:00
app.booking.time-windows.afternoon=14:00
app.booking.time-windows.evening=18:00

# =============================================================================
# CHECK-IN HANDSHAKE CONFIGURATION
# =============================================================================

# Scheduler configuration
app.checkin.scheduler.enabled=true

# Scheduler cron - run every 15 minutes to catch bookings within the 1-hour window
# With hourly runs and 1-hour window, bookings could be missed or have insufficient time
app.checkin.scheduler.window-cron=0 0/15 * * * *
app.checkin.scheduler.noshow-diagnostics-enabled=true

# Window timing - when check-in window opens before trip start
# CRITICAL: Must align with app.checkin.max-early-hours for consistent UX
# If window opens before submission is allowed, users can start but not finish
# Set to 1 hour to match insurance alignment requirement (Phase 4A)
app.checkin.window-hours-before-trip=1

# Reminder timing - when to send check-in reminders
app.checkin.reminder-hours-before-trip=12

# No-show detection - minutes after trip start to mark as no-show
app.checkin.no-show-minutes-after-trip-start=30

# =============================================================================
# CHECKOUT WORKFLOW CONFIGURATION
# =============================================================================

# Scheduler configuration
app.checkout.scheduler.enabled=true

# Run every 15 minutes so checkout opens near the configured threshold
app.checkout.scheduler.window-cron=0 0/15 * * * *

# Open checkout this many hours before booking end time
app.checkout.window-hours-before-trip=1

# Grace period after scheduled return before late-return penalties/flags apply
# Keep at 15 by default; set to 30 or 60 if policy requires more tolerance.
app.checkout.late.grace-minutes=15

# =============================================================================
# PHASE 4: SAFETY IMPROVEMENTS CONFIGURATION
# =============================================================================

# Phase 4A: Check-in Timing & Insurance Alignment
# ------------------------------------------------
# Maximum hours before trip start that check-in can be completed.
# Insurance coverage typically begins at trip start time; completing check-in
# too early can create coverage gaps. Set to 1 hour for insurance alignment.
app.checkin.max-early-hours=1

# Feature flag to enable/disable check-in timing validation
app.checkin.timing.validation-enabled=true

# Phase 4B: License Verification
# ------------------------------------------------
# Require host to confirm they verified guest's driver's license in-person
# before check-in can be completed. Critical for insurance compliance.
app.checkin.license-verification.required=true

# Feature flag to enable/disable license verification requirement
app.checkin.license-verification.enabled=true

# Phase 4C: Hardened No-Show Logic
# ------------------------------------------------
# Require at least one messaging attempt before triggering no-show.
# Prevents false positives when communication issues occur.
app.checkin.noshow.require-message-attempt=true

# Differentiated grace periods based on trip length
# Short trips (<= 24h) have tighter grace periods
app.checkin.noshow.short-trip-threshold-hours=24
app.checkin.noshow.short-trip-grace-minutes=15
app.checkin.noshow.long-trip-grace-minutes=30

# Phase 4D: Late Return Tiered Penalties
# ------------------------------------------------
# Tier 1: 0-2 hours late
app.checkout.late.tier1-max-hours=2
app.checkout.late.tier1-rate-rsd=500

# Tier 2: 2-6 hours late
app.checkout.late.tier2-max-hours=6
app.checkout.late.tier2-rate-rsd=750

# Tier 3: 6-24 hours late
app.checkout.late.tier3-rate-rsd=1000

# Vehicle not returned threshold (hours overdue before escalation)
app.checkout.vehicle-not-returned-threshold-hours=24

# Phase 4E: Photo Timing Windows
# ------------------------------------------------
# Maximum hours after check-in/checkout window opens to upload photos
# with full evidentiary weight. Late uploads get SECONDARY weight.
app.checkin.photo-upload-deadline-hours=24
app.checkout.photo-upload-deadline-hours=24

# Phase 4F: Improper Return Detection
# ------------------------------------------------
# Automatic detection of improper vehicle return conditions.
# These thresholds trigger IMPROPER_RETURN_FLAGGED events.

# Fuel difference threshold (percentage points below start level)
# e.g., 25 = flag if end fuel is 25%+ lower than start fuel
app.checkout.improper-return.fuel-difference-threshold=25

# Mileage multiplier threshold (times estimated mileage)
# e.g., 2.0 = flag if actual mileage > 2x estimated daily allowance
app.checkout.improper-return.mileage-multiplier-threshold=2.0

# Phase 4I: Begun Notifications
# ------------------------------------------------
# Send notifications when check-in/checkout process begins
app.checkin.begun-notifications.enabled=true

# =============================================================================
# EXIF Validation Settings
# =============================================================================
# BASEMENT PROBLEM FIX: Photos may be taken in parking garages with no signal.
# Host takes photos at 10:00, spends 20 min inspecting, drives out at 10:35.
# Using server receipt time would reject valid photos. Solution:
# 1. Increase max-age to 120 minutes (2 hours) for tolerance
# 2. Compare EXIF timestamp vs client_upload_started_timestamp (passed in request)
# =============================================================================

# Maximum age of photo EXIF timestamp relative to client upload start time (NOT server time)
# Set to 120 minutes to handle garage/basement scenarios with poor signal
app.checkin.exif.max-age-minutes=120

# Tolerance for clock drift between device EXIF and client-reported upload start (seconds)
# Allows for reasonable device clock skew
app.checkin.exif.client-timestamp-tolerance-seconds=300

# Maximum age of client upload start timestamp (SECURITY FIX - Critical)
# Prevents uploading old HEIC/no-EXIF photos by validating client timestamp freshness
# If client says "I started upload X minutes ago", we verify X is reasonable
# Legitimate uploads: client timestamp is always fresh (< 1 minute)
# Fraud attempt: old photo with stale client timestamp (hours/days old)
app.checkin.exif.client-timestamp-max-age-minutes=5

# Maximum distance (in meters) from car location for GPS validation
app.checkin.exif.max-distance-meters=1000

# Whether to require GPS data in photos (false = accept photos without GPS)
app.checkin.exif.require-gps=false

# Geofence Settings for Handshake
# =============================================================================
# GPS DRIFT FIX: Urban canyons (New Belgrade high-rises, Vračar narrow streets)
# can cause 50m+ GPS drift. Strict enforcement blocks legitimate users.
# Solution: Dynamic radius based on location density.
# =============================================================================

# Default radius (used when dynamic calculation fails or is disabled)
app.checkin.geofence.threshold-meters=100

# Dynamic geofence radius based on location type (overrides threshold-meters)
# Urban: high-rise areas, narrow streets - larger radius due to GPS multipath
# Suburban: residential areas - medium radius
# Rural: open areas - tighter radius, better GPS accuracy
app.checkin.geofence.radius-urban-meters=150
app.checkin.geofence.radius-suburban-meters=100
app.checkin.geofence.radius-rural-meters=50

# Enable dynamic radius calculation based on car's home location density
# If false, uses threshold-meters for all locations
app.checkin.geofence.dynamic-radius-enabled=true

# Strict mode - if true, GPS is required for handshake confirmation
# Default false for MVP - blocks too many legitimate users with GPS issues
app.checkin.geofence.strict=false

# Photo Upload Settings
# =============================================================================
# SERBIAN 4G RISK: 10MB * 15 photos = 150MB payload.
# Edge/3G on Tara or Stara Planina will timeout, drain battery, fail.
# =============================================================================
# BACKEND: 10MB limit is safety net only.
# FRONTEND MANDATE (Phase 3): Must compress images client-side to <500KB before upload.
# Use browser-image-compression or similar library.
# Do NOT rely on backend limit to manage performance.
# =============================================================================

# Directory for check-in photos (relative to uploads directory)
app.checkin.photos.directory=check-in-photos

# Maximum photo size in bytes - REDUCED from 10MB to 3MB for mobile performance
# Frontend MUST compress to 500KB before upload
app.checkin.photos.max-size=3145728
app.checkin.photo.max-size-mb=3

# Maximum photo dimensions (prevents memory exhaustion on mobile)
app.checkin.photo.max-width-pixels=2560
app.checkin.photo.max-height-pixels=2560

# Target size for frontend compression (informational, enforced by frontend)
app.checkin.photos.frontend-target-size=512000

# Allowed photo MIME types
app.checkin.photos.allowed-types=image/jpeg,image/png,image/heic

# =============================================================================
# GEOSPATIAL LOCATION SERVICES - Development
# =============================================================================
# OSRM (Open Source Routing Machine) for driving distance calculation
# Uses public demo server for development; deploy own instance for production
rentoza.osrm.base-url=https://router.project-osrm.org
rentoza.osrm.enabled=true

# Nominatim (OpenStreetMap Geocoding) for location migration
# RATE LIMIT: Max 1 request/second per OSM policy
rentoza.nominatim.base-url=https://nominatim.openstreetmap.org
rentoza.nominatim.enabled=true

# Mapbox configuration for frontend maps
# Token is passed to Angular via environment configuration
rentoza.mapbox.access-token=${MAPBOX_TOKEN:}
rentoza.mapbox.style=mapbox://styles/mapbox/streets-v12

# Serbia default center coordinates (Belgrade)
rentoza.geo.default-latitude=44.8176
rentoza.geo.default-longitude=20.4569
rentoza.geo.default-zoom=12

# =============================================================================
# STATIC RESOURCE HANDLING - Development
# =============================================================================
# Upload path for user-generated content
app.upload.path=uploads

# Missing resource handling configuration
app.resource-missing.log-level=INFO
app.resource-missing.return-placeholder=true
app.resource-missing.fallback-image=/images/placeholder-car.svg

# Spring resource handling configuration
spring.web.resources.add-mappings=true
spring.mvc.throw-exception-if-no-handler-found=true
