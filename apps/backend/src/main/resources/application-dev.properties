spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
spring.data.redis.timeout=${REDIS_TIMEOUT:2000ms}
spring.data.redis.connect-timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=1

# Sentinel/Cluster modes (production only - uncomment if testing locally)
# spring.data.redis.sentinel.master=mymaster
# spring.data.redis.sentinel.nodes=localhost:26379
# spring.data.redis.cluster.nodes=localhost:6379

# =============================================================================
# RABBITMQ - Development (Async Photo Processing)
# =============================================================================
# To run RabbitMQ: brew install rabbitmq && brew services start rabbitmq
# Management UI: http://localhost:15672 (guest/guest)
# NOTE: Set to false if RabbitMQ is not running locally
app.rabbitmq.enabled=true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# Publisher confirmations for reliability
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true

# Consumer settings
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000ms
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.max-interval=10000ms
spring.rabbitmq.listener.simple.retry.multiplier=2.0

# Default limits (applies to unlisted endpoints)
app.rate-limit.default-limit=20
app.rate-limit.default-window-seconds=60

# Trusted proxies for X-Forwarded-For validation
# Development: Empty = trust private networks (127.0.0.1, 192.168.*, etc.)
# Production: Set explicit load balancer/CDN IPs
app.rate-limit.trusted-proxies=

# Endpoint-specific rate limits (stricter for sensitive endpoints)
# Login endpoint - prevent brute-force attacks
app.rate-limit.endpoints./api/auth/login.limit=3
app.rate-limit.endpoints./api/auth/login.window-seconds=60

# Register endpoint - prevent spam account creation
app.rate-limit.endpoints./api/auth/register.limit=2
app.rate-limit.endpoints./api/auth/register.window-seconds=300
# Enhanced registration endpoints (Phase 2 role-specific registration)
app.rate-limit.endpoints./api/auth/register/user.limit=2
app.rate-limit.endpoints./api/auth/register/user.window-seconds=60
app.rate-limit.endpoints./api/auth/register/owner.limit=2
app.rate-limit.endpoints./api/auth/register/owner.window-seconds=60

# Refresh endpoint - STRICT rate limiting (Phase 2 hardening)
# 5 requests per minute per IP to prevent brute-force token guessing
app.rate-limit.endpoints./api/auth/refresh.limit=3
app.rate-limit.endpoints./api/auth/refresh.window-seconds=60

# SECURITY (H-4): Profile picture upload rate limit
# 5 uploads per 60 seconds to prevent abuse/DoS
app.rate-limit.endpoints./api/users/me/profile-picture.limit=5
app.rate-limit.endpoints./api/users/me/profile-picture.window-seconds=60

# Check-in status polling: allow active UI refresh without unbounded abuse
app.rate-limit.endpoints./api/bookings/*/check-in/status.limit=30
app.rate-limit.endpoints./api/bookings/*/check-in/status.window-seconds=60

# Lockbox reveal: strict brute-force protection
app.rate-limit.endpoints./api/bookings/*/check-in/lockbox-code.limit=5
app.rate-limit.endpoints./api/bookings/*/check-in/lockbox-code.window-seconds=60

# Handshake confirmation: limited retries per minute
app.rate-limit.endpoints./api/bookings/*/check-in/handshake.limit=10
app.rate-limit.endpoints./api/bookings/*/check-in/handshake.window-seconds=60

# Host license verification: limited retries per minute
app.rate-limit.endpoints./api/bookings/*/check-in/host/license-verification.limit=5
app.rate-limit.endpoints./api/bookings/*/check-in/host/license-verification.window-seconds=60

# Supabase auth endpoints (Phase 3 hardening)
app.rate-limit.endpoints./api/auth/supabase/login.limit=3
app.rate-limit.endpoints./api/auth/supabase/login.window-seconds=60
app.rate-limit.endpoints./api/auth/supabase/register.limit=2
app.rate-limit.endpoints./api/auth/supabase/register.window-seconds=300
app.rate-limit.endpoints./api/auth/supabase/refresh.limit=3
app.rate-limit.endpoints./api/auth/supabase/refresh.window-seconds=60
app.rate-limit.endpoints./api/auth/supabase/forgot-password.limit=2
app.rate-limit.endpoints./api/auth/supabase/forgot-password.window-seconds=300
app.rate-limit.endpoints./api/auth/supabase/reset-password.limit=3
app.rate-limit.endpoints./api/auth/supabase/reset-password.window-seconds=300

# Public car listing - prevent scraping
app.rate-limit.endpoints./api/cars.limit=60
app.rate-limit.endpoints./api/cars.window-seconds=60

# Search endpoints - 100 requests per minute per IP/user
app.rate-limit.endpoints./api/cars/search.limit=100
app.rate-limit.endpoints./api/cars/search.window-seconds=60
app.rate-limit.endpoints./api/cars/availability-search.limit=100
app.rate-limit.endpoints./api/cars/availability-search.window-seconds=60

# Public booking availability - calendar view
app.rate-limit.endpoints./api/bookings/car/*/public.limit=60
app.rate-limit.endpoints./api/bookings/car/*/public.window-seconds=60

# Conversation view - chat enrichment (higher limits for service-to-service)
# IP-based limit: 120 requests per minute (for direct JWT calls)
app.rate-limit.endpoints./api/bookings/*/conversation-view.limit=120
app.rate-limit.endpoints./api/bookings/*/conversation-view.window-seconds=60

# Internal service rate limit: 300 requests per minute (for chat microservice)
# Note: This applies to all INTERNAL_SERVICE requests, not just conversation-view
app.rate-limit.internal-service.limit=300
app.rate-limit.internal-service.window-seconds=60

# Webhook endpoint: 100 events per minute per IP (M4 — public endpoint DoS protection)
app.rate-limit.endpoints./api/webhooks/payment.limit=100
app.rate-limit.endpoints./api/webhooks/payment.window-seconds=60

# Phone verification: 3 OTP zahteva na 15 minuta (sprečava SMS spam)
app.rate-limit.endpoints./api/users/me/phone-verification/request.limit=3
app.rate-limit.endpoints./api/users/me/phone-verification/request.window-seconds=900
app.rate-limit.endpoints./api/users/me/phone-verification/confirm.limit=10
app.rate-limit.endpoints./api/users/me/phone-verification/confirm.window-seconds=900
app.rate-limit.endpoints./api/users/me/phone-verification/resend.limit=3
app.rate-limit.endpoints./api/users/me/phone-verification/resend.window-seconds=900

# Booking creation: 5 per hour per user (sprečava booking spam)
app.rate-limit.endpoints./api/bookings.limit=5
app.rate-limit.endpoints./api/bookings.window-seconds=3600

