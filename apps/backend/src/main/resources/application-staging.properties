# =============================================================================
# Rentoza Application - Staging Profile
# =============================================================================
# Staging environment: mirrors production architecture but uses MOCK payment
# provider by default until Monri credentials are configured.
#
# Activate with: SPRING_PROFILES_ACTIVE=prod,staging
#   - 'prod' provides all infrastructure properties (Supabase, CORS, OAuth, etc.)
#   - 'staging' overrides only payment-specific settings (loaded last, takes precedence)
# Override payment provider: PAYMENT_PROVIDER=MONRI (when credentials are ready)

# =============================================================================
# PAYMENT PROVIDER CONFIGURATION
# =============================================================================
# Default to MOCK for credentialless staging. To go live with Monri:
#   1. Set PAYMENT_PROVIDER=MONRI
#   2. Set MONRI_MERCHANT_KEY and MONRI_AUTHENTICITY_TOKEN
#   3. Restart the service
app.payment.provider=${PAYMENT_PROVIDER:MOCK}
# Override prod's enforce-real-provider=true. The validator checks if "prod" appears
# in the active profiles string; with SPRING_PROFILES_ACTIVE=prod,staging it does.
# Setting this to false prevents startup crash when using MOCK in staging.
app.payment.enforce-real-provider=false
app.payment.deposit.amount-rsd=30000
app.payment.service-fee-rate=0.15

# Monri credentials — only resolved when PAYMENT_PROVIDER=MONRI (ConditionalOnProperty).
# Empty defaults are safe: the MonriPaymentProvider bean is not created in MOCK mode.
app.payment.monri.merchant-key=${MONRI_MERCHANT_KEY:}
app.payment.monri.authenticity-token=${MONRI_AUTHENTICITY_TOKEN:}
app.payment.monri.api-url=${MONRI_API_URL:https://ipgtest.monri.com}

# =============================================================================
# DATABASE
# =============================================================================
# Staging uses its own database (set via environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=none

# =============================================================================
# SECURITY
# =============================================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:3600000}

# =============================================================================
# LOGGING
# =============================================================================
# More verbose than production for debugging staging issues
logging.level.org.example.rentoza=INFO
logging.level.org.example.rentoza.payment=DEBUG
