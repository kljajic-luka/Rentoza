# =============================================================================
# Rentoza Application Configuration Template
# =============================================================================
# This is a TEMPLATE file for documentation purposes
# Copy appropriate sections to application-{profile}.properties
#
# NEVER commit actual credentials to version control
# Use environment variables or .env files (gitignored) for sensitive data

# =============================================================================
# QUICK START GUIDE
# =============================================================================
# 1. For local development:
#    - Copy example values to application-dev-local.properties (gitignored)
#    - Or set environment variables
#    - Activate with: -Dspring.profiles.active=dev
#
# 2. For production:
#    - Set ALL required environment variables
#    - Use secrets manager (AWS Secrets, Azure Key Vault, etc.)
#    - Activate with: -Dspring.profiles.active=prod

# =============================================================================
# ENVIRONMENT VARIABLES REFERENCE
# =============================================================================

# --- Required for ALL environments ---
JWT_SECRET=                    # Base64 encoded secret (64+ bytes). Generate: openssl rand -base64 64
DB_URL=                        # JDBC connection string
DB_USERNAME=                   # Database username
DB_PASSWORD=                   # Database password
CORS_ORIGINS=                  # Allowed frontend origins (comma-separated)
COOKIE_DOMAIN=                 # Cookie domain (localhost for dev, yourdomain.com for prod)

# --- Development defaults (optional overrides) ---
DB_URL=jdbc:postgresql://aws-1-eu-central-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
DB_USERNAME=postgres.your-project-ref
DB_PASSWORD=<from-supabase-dashboard>
CORS_ORIGINS=http://localhost:4200
COOKIE_DOMAIN=localhost
COOKIE_SECURE=false
SERVER_PORT=8080
LOG_LEVEL_ROOT=INFO
LOG_LEVEL_APP=DEBUG

# --- Production required ---
DB_URL=jdbc:postgresql://aws-1-eu-central-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
DB_USERNAME=postgres.your-project-ref
DB_PASSWORD=<use-secrets-manager>
CORS_ORIGINS=https://rentoza.rs,https://www.rentoza.rs
COOKIE_DOMAIN=rentoza.rs
COOKIE_SECURE=true
SERVER_PORT=8080
SSL_ENABLED=false              # true if terminating SSL in Spring Boot, false if using reverse proxy

# --- Optional production settings ---
DB_POOL_SIZE=20
DB_POOL_MIN_IDLE=5
JWT_EXPIRATION_MS=900000       # 15 minutes in milliseconds
JWT_ISSUER=rentoza
JWT_AUDIENCE=rentoza-api
REFRESH_TOKEN_DAYS=14
LOG_FILE_PATH=/var/log/rentoza/application.log
ACTUATOR_PORT=8080
METRICS_PROMETHEUS_ENABLED=false
MAX_FILE_SIZE=10MB
MAX_REQUEST_SIZE=10MB

# --- SSL Configuration (if terminating in Spring Boot) ---
SSL_KEYSTORE=/path/to/keystore.p12
SSL_KEYSTORE_PASSWORD=<keystore-password>
SSL_KEY_ALIAS=rentoza

# =============================================================================
# DATABASE CONFIGURATION EXAMPLES (PostgreSQL via Supabase)
# =============================================================================

