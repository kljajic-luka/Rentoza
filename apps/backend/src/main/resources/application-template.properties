# =============================================================================
# PRODUCTION DEPLOYMENT NOTES
# =============================================================================

# 1. NEVER hardcode credentials in application.properties
# 2. Use environment variables or secrets management
# 3. Keep application-prod.properties in version control (no secrets)
# 4. Use different JWT secrets for dev, staging, and production
# 5. Enable HTTPS in production (via reverse proxy or Spring Boot)
# 6. Set up proper logging and monitoring
# 7. Configure database connection pooling for your load
# 8. Test with production-like data volumes
# 9. Set up automated backups
# 10. Configure health checks for your load balancer

# =============================================================================
# SECURITY BEST PRACTICES
# =============================================================================

# 1. JWT Secret:
#    - Minimum 256 bits (32 bytes), preferably 512 bits (64 bytes)
#    - Cryptographically secure random generation
#    - Different secret per environment
#    - Rotate periodically (requires token invalidation strategy)

# 2. Database:
#    - Use SSL/TLS for database connections in production
#    - Principle of least privilege for database user
#    - Regular security updates
#    - Backup encryption

# 3. CORS:
#    - Whitelist only your actual domains
#    - Never use "*" in production
#    - Include www and non-www if needed

# 4. Cookies:
#    - Always set Secure flag in production (HTTPS)
#    - Use HttpOnly flag (prevents XSS)
#    - SameSite=Strict or Lax

# 5. Rate Limiting:
#    - Implement at API Gateway or application level
#    - Protect authentication endpoints
#    - Consider different limits per endpoint

# =============================================================================
# MONITORING AND ALERTING
# =============================================================================

# Recommended metrics to monitor:
# - Application health (/actuator/health)
# - Response times (p50, p95, p99)
# - Error rates (4xx, 5xx)
# - Database connection pool usage
# - JVM memory and garbage collection
# - Authentication failures
# - API rate limit violations

# Recommended alerts:
# - Application unhealthy
# - High error rate (>5%)
# - Slow response times (>1s for p95)
# - Database connection pool exhausted
# - High memory usage (>80%)
# - Failed authentications spike
# - Disk space low (<20%)

# =============================================================================
# GMAIL SMTP CONFIGURATION (FOR EMAIL NOTIFICATIONS)
# =============================================================================

# ⚠️ IMPORTANT: Gmail requires App Passwords (not your regular password) ⚠️
#
# Gmail has disabled "less secure app access" and requires App Passwords
# when using SMTP authentication. Your regular Gmail password will NOT work.
#
# How to generate a Gmail App Password:
# 1. Enable 2-Factor Authentication on your Google account
#    (Go to: https://myaccount.google.com/security)
# 2. Generate an App Password at: https://myaccount.google.com/apppasswords
# 3. Select "Mail" and your device/app name
# 4. Copy the 16-character password (spaces can be ignored)
# 5. Use this App Password in MAIL_PASSWORD environment variable
#
# Example configuration:
MAIL_HOST=smtp.gmail.com
MAIL_PORT=587
MAIL_USERNAME=your-gmail@gmail.com
MAIL_PASSWORD=abcd efgh ijkl mnop          # Your 16-character App Password
MAIL_FROM=noreply@rentoza.rs              # The "From" address shown in emails
NOTIFICATIONS_EMAIL_ENABLED=true           # Enable email notifications

# For other SMTP providers (not Gmail):
# - Amazon SES: smtp.us-east-1.amazonaws.com (port 587)
# - SendGrid: smtp.sendgrid.net (port 587)
# - Mailgun: smtp.mailgun.org (port 587)
# - Office 365: smtp.office365.com (port 587)

# =============================================================================
# TEST EMAIL REDIRECTION (DEV/STAGING ONLY)
# =============================================================================

# ⚠️ WARNING: NEVER ENABLE IN PRODUCTION! ⚠️
#
# When enabled, ALL outgoing emails are redirected to a test recipient
# instead of their original intended recipients. This prevents accidentally
# sending emails to real users during development and testing.
#
# Configuration:
MAIL_TEST_ENABLED=false                    # Set to true to enable redirection
MAIL_TEST_RECIPIENT=lkkljjc@gmail.com     # Test email recipient

# Development example (redirect all emails to test account):
# MAIL_TEST_ENABLED=true
# MAIL_TEST_RECIPIENT=lkkljjc@gmail.com
# NOTIFICATIONS_EMAIL_ENABLED=true
# MAIL_HOST=smtp.gmail.com
# MAIL_PORT=587
# MAIL_USERNAME=your-gmail@gmail.com
# MAIL_PASSWORD=your-app-password

# Production (MUST be disabled):
# MAIL_TEST_ENABLED=false

# Behavior when enabled:
# 1. All emails are sent to MAIL_TEST_RECIPIENT instead of original recipients
# 2. Subject is prefixed with "[TEST]"
# 3. Console logs show redirection: "🧪 [TEST-MODE] Redirecting email originally intended for <original> → sent to <test>"
# 4. Original recipient information is preserved in logs for debugging
#
# Use cases:
# - Local development testing
# - Staging environment testing
# - QA validation without affecting real users
# - Testing email templates and content
#
# Safety features:
# - Defaults to disabled (false)
# - Only works when explicitly enabled
# - Clear logging of all redirections
# - [TEST] prefix added to all subjects