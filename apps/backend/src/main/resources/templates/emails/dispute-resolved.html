<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8" />
		<title>Spor rešen - Rentoza</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				line-height: 1.6;
				color: #333;
			}
			.container {
				max-width: 600px;
				margin: 0 auto;
				padding: 20px;
				border: 1px solid #ddd;
				border-radius: 5px;
			}
			.header {
				background-color: #673ab7;
				color: white;
				padding: 15px;
				text-align: center;
				border-radius: 5px 5px 0 0;
			}
			.content {
				padding: 20px;
				background-color: #fafafa;
			}
			.message-box {
				background-color: white;
				border-left: 4px solid #673ab7;
				padding: 15px;
				margin: 15px 0;
				border-radius: 0 4px 4px 0;
			}
			.resolution-box {
				background-color: #ede7f6;
				border: 1px solid #673ab7;
				border-radius: 4px;
				padding: 15px;
				margin: 20px 0;
			}
			.resolution-box h4 {
				color: #4527a0;
				margin: 0 0 10px 0;
			}
			.button {
				display: inline-block;
				padding: 12px 24px;
				background-color: #673ab7;
				color: white;
				text-decoration: none;
				border-radius: 5px;
				margin-top: 20px;
			}
			.footer {
				margin-top: 20px;
				font-size: 12px;
				color: #777;
				text-align: center;
				padding-top: 15px;
				border-top: 1px solid #e0e0e0;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="header">
				<h2>📋 Spor je rešen</h2>
			</div>
			<div class="content">
				<p>Poštovani,</p>
				<div class="message-box">
					<p th:text="${message}">Vaš spor je rešen.</p>
				</div>
				<div class="resolution-box">
					<h4>✅ Odluka je doneta</h4>
					<p>
						Naš tim je pregledao sve dostavljene dokaze i doneli smo odluku.
						Molimo vas da pregledate detalje u aplikaciji.
					</p>
				</div>
				<div style="text-align: center">
					<a th:href="${bookingUrl}" class="button">Pregledaj detalje</a>
				</div>
			</div>
			<div class="footer">
				<p>
					Ako imate dodatnih pitanja,
					<a href="https://rentoza.rs/support">kontaktirajte podršku</a>.
				</p>
				<p>&copy; 2025 Rentoza. Sva prava zadržana.</p>
			</div>
		</div>
	</body>
</html>
