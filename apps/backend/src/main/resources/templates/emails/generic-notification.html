<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8" />
		<title>Obaveštenje - Rentoza</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				line-height: 1.6;
				color: #333;
			}
			.container {
				max-width: 600px;
				margin: 0 auto;
				padding: 20px;
				border: 1px solid #ddd;
				border-radius: 5px;
			}
			.header {
				background-color: #2196f3;
				color: white;
				padding: 15px;
				text-align: center;
				border-radius: 5px 5px 0 0;
			}
			.content {
				padding: 20px;
				background-color: #fafafa;
			}
			.message-box {
				background-color: white;
				border-left: 4px solid #2196f3;
				padding: 15px;
				margin: 15px 0;
				border-radius: 0 4px 4px 0;
			}
			.button {
				display: inline-block;
				padding: 12px 24px;
				background-color: #2196f3;
				color: white;
				text-decoration: none;
				border-radius: 5px;
				margin-top: 20px;
			}
			.footer {
				margin-top: 20px;
				font-size: 12px;
				color: #777;
				text-align: center;
				padding-top: 15px;
				border-top: 1px solid #e0e0e0;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="header">
				<h2>📬 Obaveštenje</h2>
			</div>
			<div class="content">
				<p>Poštovani,</p>
				<div class="message-box">
					<p th:text="${message}">Imate novo obaveštenje.</p>
				</div>
				<div style="text-align: center">
				<a href="https://rentoza.rs" class="button">Otvori Rentoza</a>
				</div>
			</div>
			<div class="footer">
				<p>&copy; 2025 Rentoza. Sva prava zadržana.</p>
			</div>
		</div>
	</body>
</html>
