# =============================================================================
# Chat Service - Production Profile Overrides
# =============================================================================
# Activated by SPRING_PROFILES_ACTIVE=prod (set by Cloud Run deploy script).
# All secrets (DB_PASSWORD, JWT_SECRET, etc.) are injected at runtime via
# GCP Secret Manager bindings in deploy-backend-secure.sh.
# This file contains ZERO secrets. Only safe production defaults.
# =============================================================================

# --- Database ---
# No fallback. Fail-fast if Secret Manager injection is missing.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- Supabase ---
# No fallback. Injected from Secret Manager.
supabase.url=${SUPABASE_URL}
supabase.jwt.issuer=${SUPABASE_URL}/auth/v1
supabase.jwt.jwks-url=${SUPABASE_URL}/auth/v1/.well-known/jwks.json

# --- Backend API ---
# No fallback. Deploy script resolves this from the live Cloud Run backend URL.
backend.api.base-url=${BACKEND_API_BASE_URL}

# --- CORS ---
# No fallback. Deploy script injects production origins.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS}

# --- Logging ---
# Override application.properties DEBUG levels with production-safe values.
# These MUST be set here because Spring Boot logging.level.* properties
# override logback-spring.xml after XML initialization.
logging.level.org.example.chatservice=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN