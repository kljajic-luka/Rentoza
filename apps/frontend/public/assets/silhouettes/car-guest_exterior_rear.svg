<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Car Rear View Silhouette for Photo Guidance -->
  <title>Vehicle Rear View - Capture Guide</title>
  <desc>Semi-transparent silhouette showing optimal rear angle positioning for vehicle photo capture</desc>
  
  <!-- Background with transparency indicator -->
  <rect width="400" height="300" fill="transparent"/>
  
  <!-- Vehicle rear body outline -->
  <g opacity="0.6" stroke="#3B82F6" stroke-width="2" fill="none">
    <!-- Main rear body shape -->
    <path d="M80 200 L80 120 Q80 100 100 95 L160 85 Q200 80 240 85 L300 95 Q320 100 320 120 L320 200" stroke-dasharray="8,4"/>
    
    <!-- Rear window -->
    <path d="M120 110 Q200 100 280 110 L275 145 Q200 140 125 145 Z" stroke-dasharray="6,3"/>
    
    <!-- Trunk/boot area -->
    <path d="M90 155 L310 155" stroke-dasharray="4,2"/>
    
    <!-- Rear bumper -->
    <rect x="70" y="200" width="260" height="25" rx="5" stroke-dasharray="6,3"/>
    
    <!-- Tail lights - left -->
    <rect x="80" y="160" width="35" height="35" rx="5" stroke="#EF4444" stroke-width="3"/>
    <text x="97" y="182" font-size="8" fill="#EF4444" text-anchor="middle">L</text>
    
    <!-- Tail lights - right -->
    <rect x="285" y="160" width="35" height="35" rx="5" stroke="#EF4444" stroke-width="3"/>
    <text x="303" y="182" font-size="8" fill="#EF4444" text-anchor="middle">R</text>
    
    <!-- License plate area (highlighted) -->
    <g>
      <rect x="150" y="205" width="100" height="30" rx="3" stroke="#22C55E" stroke-width="3" fill="#22C55E" fill-opacity="0.1"/>
      <text x="200" y="225" font-size="10" fill="#22C55E" text-anchor="middle" font-weight="bold">LICENSE</text>
    </g>
    
    <!-- Exhaust pipe(s) -->
    <ellipse cx="120" cy="228" rx="12" ry="6" stroke-dasharray="4,2"/>
    <ellipse cx="280" cy="228" rx="12" ry="6" stroke-dasharray="4,2"/>
    
    <!-- Wheels (rear view) -->
    <ellipse cx="95" cy="240" rx="20" ry="8" stroke-dasharray="4,2"/>
    <ellipse cx="305" cy="240" rx="20" ry="8" stroke-dasharray="4,2"/>
  </g>
  
  <!-- Alignment guides -->
  <g stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,4" opacity="0.4">
    <!-- Center vertical line -->
    <line x1="200" y1="50" x2="200" y2="280"/>
    <!-- Horizontal alignment -->
    <line x1="50" y1="180" x2="350" y2="180"/>
  </g>
  
  <!-- Corner alignment markers -->
  <g stroke="#3B82F6" stroke-width="2" opacity="0.5">
    <path d="M60 60 L60 80 M60 60 L80 60"/>
    <path d="M340 60 L340 80 M340 60 L320 60"/>
    <path d="M60 260 L60 240 M60 260 L80 260"/>
    <path d="M340 260 L340 240 M340 260 L320 260"/>
  </g>
  
  <!-- Instruction text -->
  <text x="200" y="30" font-size="12" fill="#64748B" text-anchor="middle" font-weight="500">
    Align vehicle rear in frame
  </text>
  <text x="200" y="285" font-size="10" fill="#64748B" text-anchor="middle">
    Ensure both tail lights and license plate are visible
  </text>
</svg>
