<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Car Right Side Profile Silhouette for Photo Guidance -->
  <title>Vehicle Right Side - Capture Guide</title>
  <desc>Semi-transparent silhouette showing optimal right side profile positioning</desc>
  
  <!-- Background with transparency indicator -->
  <rect width="400" height="300" fill="transparent"/>
  
  <!-- Vehicle right side profile (mirror of left, facing right) -->
  <g opacity="0.6" stroke="#3B82F6" stroke-width="2" fill="none">
    <!-- Roof line -->
    <path d="M120 120 Q140 90 180 85 L260 85 Q300 90 320 120" stroke-dasharray="8,4"/>
    
    <!-- Front windshield (now on left side of view) -->
    <path d="M120 120 L140 160" stroke-dasharray="6,3"/>
    
    <!-- Rear windshield (now on right side of view) -->
    <path d="M320 120 L300 155" stroke-dasharray="6,3"/>
    
    <!-- Side windows -->
    <path d="M140 115 L145 150 L185 150 L180 115 Z" stroke-dasharray="6,3"/>
    <path d="M190 115 L190 150 L250 150 L250 115 Z" stroke-dasharray="6,3"/>
    <path d="M255 115 L255 150 L295 155 L300 115 Z" stroke-dasharray="6,3"/>
    
    <!-- Body line -->
    <path d="M60 180 L55 170 Q50 160 70 155 L100 155 L340 155 Q370 160 365 170 L360 180" stroke-dasharray="8,4"/>
    
    <!-- Door outlines -->
    <line x1="180" y1="115" x2="175" y2="195" stroke-dasharray="4,2"/>
    <line x1="260" y1="115" x2="255" y2="195" stroke-dasharray="4,2"/>
    
    <!-- Door handles -->
    <rect x="150" y="160" width="20" height="6" rx="2" stroke-dasharray="4,2"/>
    <rect x="220" y="160" width="20" height="6" rx="2" stroke-dasharray="4,2"/>
    
    <!-- Side mirrors (right side visible) -->
    <ellipse cx="125" cy="140" rx="10" ry="6" stroke-dasharray="4,2"/>
    
    <!-- Rocker panel / sill -->
    <rect x="70" y="195" width="280" height="10" rx="2" stroke-dasharray="6,3"/>
    
    <!-- Rear wheel well and wheel (highlighted) -->
    <g>
      <path d="M285 205 Q285 170 320 170 Q355 170 355 205" stroke="#22C55E" stroke-width="3"/>
      <circle cx="320" cy="210" r="30" stroke="#22C55E" stroke-width="3" fill="#22C55E" fill-opacity="0.1"/>
      <circle cx="320" cy="210" r="12" stroke="#22C55E" stroke-width="2"/>
      <text x="320" y="255" font-size="9" fill="#22C55E" text-anchor="middle">Wheel visible</text>
    </g>
    
    <!-- Front wheel well and wheel (highlighted) -->
    <g>
      <path d="M65 205 Q65 170 100 170 Q135 170 135 205" stroke="#22C55E" stroke-width="3"/>
      <circle cx="100" cy="210" r="30" stroke="#22C55E" stroke-width="3" fill="#22C55E" fill-opacity="0.1"/>
      <circle cx="100" cy="210" r="12" stroke="#22C55E" stroke-width="2"/>
      <text x="100" y="255" font-size="9" fill="#22C55E" text-anchor="middle">Wheel visible</text>
    </g>
    
    <!-- Ground line -->
    <line x1="30" y1="240" x2="370" y2="240" stroke="#94A3B8" stroke-width="1" stroke-dasharray="8,4"/>
  </g>
  
  <!-- Direction indicator -->
  <g fill="#3B82F6" opacity="0.7">
    <polygon points="380,150 360,140 360,160"/>
    <text x="355" y="175" font-size="9" text-anchor="end">FRONT</text>
  </g>
  <g fill="#64748B" opacity="0.5">
    <polygon points="20,150 40,140 40,160"/>
    <text x="45" y="175" font-size="9">REAR</text>
  </g>
  
  <!-- Alignment guides -->
  <g stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,4" opacity="0.4">
    <line x1="200" y1="50" x2="200" y2="270"/>
    <line x1="30" y1="160" x2="370" y2="160"/>
  </g>
  
  <!-- Corner alignment markers -->
  <g stroke="#3B82F6" stroke-width="2" opacity="0.5">
    <path d="M40 50 L40 70 M40 50 L60 50"/>
    <path d="M360 50 L360 70 M360 50 L340 50"/>
    <path d="M40 270 L40 250 M40 270 L60 270"/>
    <path d="M360 270 L360 250 M360 270 L340 270"/>
  </g>
  
  <!-- Instruction text -->
  <text x="200" y="25" font-size="12" fill="#64748B" text-anchor="middle" font-weight="500">
    Capture full right side profile
  </text>
  <text x="200" y="285" font-size="10" fill="#64748B" text-anchor="middle">
    Ensure both wheels and entire side are visible
  </text>
</svg>
