<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f3f4f6"/>
  
  <!-- Car silhouette -->
  <g transform="translate(100, 100)">
    <!-- Car body -->
    <path d="M 0,60 L 20,40 L 60,30 L 140,30 L 180,40 L 200,60 L 200,100 L 0,100 Z" 
          fill="#d1d5db" stroke="#9ca3af" stroke-width="2"/>
    
    <!-- Car windows -->
    <path d="M 30,45 L 50,35 L 90,35 L 90,60 L 30,60 Z" 
          fill="#e5e7eb"/>
    <path d="M 110,35 L 150,35 L 170,45 L 170,60 L 110,60 Z" 
          fill="#e5e7eb"/>
    
    <!-- Wheels -->
    <circle cx="40" cy="100" r="15" fill="#6b7280" stroke="#374151" stroke-width="2"/>
    <circle cx="40" cy="100" r="8" fill="#9ca3af"/>
    <circle cx="160" cy="100" r="15" fill="#6b7280" stroke="#374151" stroke-width="2"/>
    <circle cx="160" cy="100" r="8" fill="#9ca3af"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="230" font-family="Arial, sans-serif" font-size="16" fill="#6b7280" text-anchor="middle">
    Slika nije dostupna
  </text>
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">
    Image not available
  </text>
</svg>
