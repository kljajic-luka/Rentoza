<!-- 
  Dashboard Interior Silhouette for Photo Capture Guidance
  Used for GUEST_INTERIOR_DASHBOARD and HOST_INTERIOR_DASHBOARD photo types.
  
  Display at 30% opacity over camera preview to guide positioning.
-->
<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Dashboard interior view -->
  <g fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Windshield frame -->
    <path d="M30 40 L50 20 L350 20 L370 40" />
    
    <!-- Dashboard top -->
    <path d="M30 40 L30 120 L370 120 L370 40" />
    
    <!-- Steering wheel -->
    <circle cx="120" cy="180" r="55" />
    <circle cx="120" cy="180" r="35" />
    <!-- Steering wheel spokes -->
    <line x1="120" y1="125" x2="120" y2="145" />
    <line x1="120" y1="215" x2="120" y2="235" />
    <line x1="65" y1="180" x2="85" y2="180" />
    <line x1="155" y1="180" x2="175" y2="180" />
    
    <!-- Instrument cluster -->
    <rect x="70" y="80" width="100" height="40" rx="5" />
    <!-- Speedometer -->
    <circle cx="95" cy="100" r="15" />
    <!-- Tachometer -->
    <circle cx="145" cy="100" r="15" />
    
    <!-- Center console -->
    <rect x="200" y="70" width="120" height="80" rx="8" />
    <!-- Screen/Display -->
    <rect x="210" y="80" width="100" height="60" rx="4" />
    
    <!-- Climate controls -->
    <circle cx="230" cy="165" r="10" />
    <circle cx="260" cy="165" r="10" />
    <circle cx="290" cy="165" r="10" />
    
    <!-- Gear shifter area -->
    <rect x="220" y="200" width="60" height="80" rx="5" />
    
    <!-- Passenger side -->
    <rect x="330" y="150" width="50" height="30" rx="5" />
  </g>
  
  <!-- Odometer highlight (dashed circle to indicate importance) -->
  <circle 
    cx="95" cy="100" r="20" 
    fill="none" 
    stroke="#4CAF50" 
    stroke-width="2" 
    stroke-dasharray="5,3" 
    opacity="0.8"
  />
  
  <!-- Frame guide -->
  <rect 
    x="15" y="10" 
    width="370" height="280" 
    fill="none" 
    stroke="#FFFFFF" 
    stroke-width="2" 
    stroke-dasharray="10,5" 
    opacity="0.5"
  />
  
  <!-- Instruction hints -->
  <text x="95" y="130" text-anchor="middle" font-size="9" fill="#4CAF50" opacity="0.9">
    Kilometraža
  </text>
  
  <text x="200" y="290" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.7">
    Volan i instrument tabla moraju biti vidljivi
  </text>
</svg>
