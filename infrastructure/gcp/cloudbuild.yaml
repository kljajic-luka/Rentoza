# =============================================================================
# Rentoza Platform - Cloud Build CI/CD Configuration
# =============================================================================
# Triggers on push to main branch, builds and deploys both services
# =============================================================================

substitutions:
  _REGION: europe-west1
  _BACKEND_SERVICE: rentoza-backend
  _CHAT_SERVICE: rentoza-chat
  _REPO: rentoza
  _SPRING_PROFILES_ACTIVE: prod
  _OAUTH2_REDIRECT_ALLOWED_URIS: https://rentoza.rs/auth/supabase/google/callback,https://www.rentoza.rs/auth/supabase/google/callback
  _PAYMENT_PROVIDER: MOCK
  _CHECKIN_NO_SHOW_MINUTES_AFTER_TRIP_START: '30'
  _CHECKIN_SCHEDULER_NOSHOW_CRON: '0 0/10 * * * *'
  _CHECKIN_SCHEDULER_NOSHOW_DIAGNOSTICS_ENABLED: 'false'
  _APP_FRONTEND_URL: 'https://rentoza.rs'
  # ID Verification Provider - CRITICAL: Must match a @ConditionalOnProperty provider (ONFIDO or MOCK)
  _ID_VERIFICATION_PROVIDER: 'ONFIDO'
  _FACE_MATCH_THRESHOLD: '0.95'
  _SELFIE_REQUIRED: 'true'

steps:
  # =============================================================================
  # Step 1: Build Main Backend Image
  # =============================================================================
  - id: 'build-backend'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:latest'
      - '--cache-from'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:latest'
      - '-f'
      - 'apps/backend/Dockerfile'
      - 'apps/backend/'

  # =============================================================================
  # Step 2: Build Chat Service Image
  # =============================================================================
  - id: 'build-chat'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/chat-service:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/chat-service:latest'
      - '--cache-from'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/chat-service:latest'
      - '-f'
      - 'apps/chat-service/Dockerfile'
      - 'apps/chat-service/'
    waitFor: ['-']  # Run in parallel with backend build

  # =============================================================================
  # Step 3: Push Backend Image
  # =============================================================================
  - id: 'push-backend'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend'
    waitFor: ['build-backend']

  # =============================================================================
  # Step 4: Push Chat Service Image
  # =============================================================================
  - id: 'push-chat'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/chat-service'
    waitFor: ['build-chat']

  # =============================================================================
  # Step 5: Deploy Backend to Cloud Run
  # =============================================================================
  - id: 'deploy-backend'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        CHAT_SERVICE_URL="$(gcloud run services describe ${_CHAT_SERVICE} --region ${_REGION} --platform managed --format='value(status.url)')"
        if [[ -z "${CHAT_SERVICE_URL}" ]]; then
          echo "Failed to resolve chat service URL for ${_CHAT_SERVICE}" >&2
          exit 1
        fi
        gcloud run deploy ${_BACKEND_SERVICE} \
          --image ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:${SHORT_SHA} \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --memory 1Gi \
          --cpu 1 \
          --min-instances 1 \
          --max-instances 10 \
          --concurrency 80 \
          --update-env-vars "^#^SPRING_PROFILES_ACTIVE=${_SPRING_PROFILES_ACTIVE}#CHAT_SERVICE_URL=${CHAT_SERVICE_URL}#OAUTH2_REDIRECT_ALLOWED_URIS=${_OAUTH2_REDIRECT_ALLOWED_URIS}#PAYMENT_PROVIDER=${_PAYMENT_PROVIDER}#APP_FRONTEND_URL=${_APP_FRONTEND_URL}#APP_ID_VERIFICATION_PROVIDER=${_ID_VERIFICATION_PROVIDER}#APP_RENTER_VERIFICATION_FACE_MATCH_THRESHOLD=${_FACE_MATCH_THRESHOLD}#APP_RENTER_VERIFICATION_SELFIE_REQUIRED=${_SELFIE_REQUIRED}#CHECKIN_NO_SHOW_MINUTES_AFTER_TRIP_START=${_CHECKIN_NO_SHOW_MINUTES_AFTER_TRIP_START}#CHECKIN_SCHEDULER_NOSHOW_CRON=${_CHECKIN_SCHEDULER_NOSHOW_CRON}#CHECKIN_SCHEDULER_NOSHOW_DIAGNOSTICS_ENABLED=${_CHECKIN_SCHEDULER_NOSHOW_DIAGNOSTICS_ENABLED}"
    waitFor: ['push-backend']

  # =============================================================================
  # Step 6: Deploy Chat Service to Cloud Run
  # =============================================================================
  - id: 'deploy-chat'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_CHAT_SERVICE}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/chat-service:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8081'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '5'
      - '--concurrency'
      - '100'
    waitFor: ['push-chat']

# Build images
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/backend:latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/chat-service:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/chat-service:latest'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Timeout for the entire build (20 minutes)
timeout: '1200s'
