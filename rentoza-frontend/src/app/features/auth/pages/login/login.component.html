<mat-card class="auth-card">
  <mat-card-header>
    <mat-card-title>Sign in to Rentoza</mat-card-title>
    <mat-card-subtitle>Manage your trips and bookings in one place.</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" required />
        <mat-error *ngIf="form.controls.email.hasError('required')">
          Email is required
        </mat-error>
        <mat-error *ngIf="form.controls.email.hasError('email')">
          Please provide a valid email address
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" required />
        <mat-error *ngIf="form.controls.password.hasError('required')">
          Password is required
        </mat-error>
        <mat-error *ngIf="form.controls.password.hasError('minlength')">
          Password should be at least 6 characters
        </mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="isSubmitting()">
        <mat-progress-spinner
          *ngIf="isSubmitting()"
          diameter="20"
          mode="indeterminate"
        ></mat-progress-spinner>
        <span *ngIf="!isSubmitting()">Sign in</span>
      </button>
    </form>
  </mat-card-content>

  <mat-card-actions>
    <span>New to Rentoza?</span>
    <a mat-button color="accent" routerLink="/auth/register">Create an account</a>
  </mat-card-actions>
</mat-card>
