<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Rentoza - Rent Premium Cars in Serbia</title>
    <base href="/" />

    <!-- 📱 MOBILE UX FOUNDATION: Native Shell Configuration -->
    <!-- viewport-fit=cover: Extends content behind notch/home indicator -->
    <!-- maximum-scale=1: Prevents unwanted zoom on input focus (accessibility preserved via user-scalable) -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5, user-scalable=yes"
    />

    <!-- 🎨 Theme Color: Seamless browser chrome integration -->
    <!-- Matches toolbar gradient primary color for unified native feel -->
    <meta name="theme-color" content="#3b82f6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1e293b" media="(prefers-color-scheme: dark)" />

    <!-- 🍎 iOS-Specific: Standalone mode + status bar styling -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rentoza" />

    <!-- 📋 SEO & PWA -->
    <meta
      name="description"
      content="Rentoza - Turo for Serbia. Rent premium cars from verified hosts across Serbia."
    />
    <link rel="icon" type="image/png" href="assets/zora_logo.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png" />

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

    <!-- Inter Font (Primary UI font) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
